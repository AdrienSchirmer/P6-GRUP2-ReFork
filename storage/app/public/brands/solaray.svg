<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 230" fill="none">
  <!-- Rainbow stripes (diagonal, left side) -->
  <clipPath id="solaray-stripe-clip">
    <rect x="0" y="0" width="190" height="230"/>
  </clipPath>
  <g clip-path="url(#solaray-stripe-clip)">
    <polygon points="0,155   65,0   95,0   30,155"  fill="#E63329"/>
    <polygon points="0,185   75,0  105,0   30,185"  fill="#F4802A"/>
    <polygon points="15,200  90,0  120,0   45,200"  fill="#F7C521"/>
    <polygon points="50,200 120,0  150,0   80,200"  fill="#72B945"/>
    <polygon points="90,200 155,0  185,0  120,200"  fill="#4DBF9F"/>
    <polygon points="130,200 185,20 185,0 160,200"  fill="#3BB8D4"/>
  </g>

  <!-- Solaray script text — tall viewBox gives descender room -->
  <text
    x="195"
    y="125"
    font-family="'Georgia', 'Palatino Linotype', serif"
    font-size="92"
    font-weight="700"
    font-style="italic"
    letter-spacing="-1"
    text-anchor="start"
    fill="#1B3A5F"
  >Solaray</text>

  <!-- Registered trademark — top right of the wordmark -->
  <text
    x="519"
    y="72"
    font-family="'Arial', sans-serif"
    font-size="18"
    fill="#1B3A5F"
  >®</text>

  <!-- EST. 1973 — centered under the wordmark -->
  <text
    x="355"
    y="172"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="19"
    font-weight="600"
    letter-spacing="3"
    text-anchor="middle"
    fill="#1B3A5F"
  >EST. 1973</text>
</svg>
