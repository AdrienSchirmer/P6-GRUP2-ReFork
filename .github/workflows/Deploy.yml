name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [published]

env:
  PHP_VERSION: '8.5'
  NODE_VERSION: '22'

jobs:
  laravel-pint-lint:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - name: Install Laravel Pint
        run: composer global require laravel/pint
      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install
      - name: Run Pint
        run: pint
      - name: Format Frontend
        run: npm run format
      - name: Lint Frontend
        run: npm run lint --fix
      - name: Pull latest changes
        run: git pull --rebase origin ${{ github.ref_name }} || true
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: fix pint code style
          commit_options: '--no-verify'
          push_options: '--force-with-lease'

  tests:
    runs-on: ubuntu-latest
    needs: laravel-pint-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: xdebug
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Node Dependencies
        run: npm i
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Copy Environment File
        run: cp .env.example .env
      - name: Configure Test Database
        run: |
          sed -i "s/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/g" .env
          echo "DB_DATABASE=:memory:" >> .env
      - name: Generate Application Key
        run: php artisan key:generate
      - name: Build Assets
        run: npm run build
      - name: Tests
        run: php artisan test --min=90 --coverage --coverage-text --coverage-html=coverage.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: curl, mbstring, pdo_mysql, tokenizer, xml, zip, zlib, ctype, openssl, fileinfo, bcmath
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Node JS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Configura WebSocket
        run: |
          cp .env.example .env
          sed -i "s/REVERB_APP_ID=-1/REVERB_APP_ID=${{ secrets.REVERB_APP_ID }}/g" .env
          sed -i "s/REVERB_APP_KEY=-1/REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}/g" .env
          sed -i "s/REVERB_APP_SECRET=-1/REVERB_APP_SECRET=${{ secrets.REVERB_APP_SECRET }}/g" .env
          sed -i "s/REVERB_PORT=8081/REVERB_PORT=${{ secrets.REVERB_PORT }}/g" .env
          sed -i "s/REVERB_HOST=localhost/REVERB_HOST=${{ secrets.FREVERB_HOST }}/g" .env
      - name: Instal·la les dependències de Node JS
        run: npm install
      - name: Compila vue.js
        run: npm run build
      - name: Fent neteja
        run: rm -rf node_modules
      # - name: Esborrar la carpeta storage
      #   run: rm -rf storage
      - name: Comprimir el projecte  (incloent els ocults)
        run: tar -czf /tmp/app.tgz . && mv /tmp/app.tgz app.tgz
      - name: Envia app.tgz al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          source: 'app.tgz'
          target: ${{ secrets.DOCUMENT_ROOT }}
          debug: true
      - name: Es connecta per ssh per fer el desplegament
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Descomprimint el fitxer app.tgz"
            cd ${{ secrets.DOCUMENT_ROOT }}
            tar -xzf app.tgz

            echo "Recrear storage si no existeix"
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            mkdir -p storage/app/public
            chmod -R 775 storage

            pwd
            ls -lisa
            echo "Copiar el fitxer env si no el tenim"
            [ -f .env ] || cp .env.example .env
            echo "Canvia el fitxer env"
            sed -i "s/DB_CONNECTION=mysql/DB_CONNECTION=${{ secrets.DB_CONNECTION }}/g" .env
            sed -i "s/DB_HOST=mysql/DB_HOST=${{ secrets.DB_HOST }}/g" .env
            sed -i "s/DB_PORT=3306/DB_PORT=${{ secrets.DB_PORT }}/g" .env
            sed -i "s/DB_DATABASE=laravel/DB_DATABASE=${{ secrets.DB_DB }}/g" .env
            sed -i "s/DB_USERNAME=sail/DB_USERNAME=${{ secrets.DB_USERNAME }}/g" .env
            sed -i "s/DB_PASSWORD=password/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/g" .env
            sed -i "s/MAIL_USERNAME=your-email@yourdomain.com/MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}/g" .env
            sed -i "s/MAIL_PASSWORD=your-dinahosting-password/MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}/g" .env
            sed -i "s/MAIL_FROM_ADDRESS=\"your-email@yourdomain.com\"/MAIL_FROM_ADDRESS=\"${{ secrets.MAIL_FROM_ADDRESS }}\"/g" .env
            sed -i "s/MAIL_MAILER=smtp/MAIL_MAILER=${{ secrets.MAIL_MAILER }}/g" .env
            sed -i "s/MAIL_SCHEME=smtp/MAIL_SCHEME=${{ secrets.MAIL_SCHEME }}/g" .env
            sed -i "s/MAIL_HOST=smtp.dinahosting.com/MAIL_HOST=${{ secrets.MAIL_HOST }}/g" .env
            sed -i "s/MAIL_PORT=587/MAIL_PORT=${{ secrets.MAIL_PORT }}/g" .env
            sed -i "s/TURNSTILE_SITE_KEY=9/TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}/g" .env
            sed -i "s/TURNSTILE_SECRET_KEY=9/TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}/g" .env
            $(which php84) artisan config:clear
            $(which php84) artisan key:generate
            echo "Executar migracions, cache i altres operacions de Laravel"
            $(which php84) artisan migrate --force --seed
            $(which php84) artisan optimize:clear
            $(which php84) artisan optimize
            $(which php84) artisan storage:unlink
            $(which php84) artisan storage:link
